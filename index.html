<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Split Money</title>
    <!-- CSS and Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- PWA meta tags -->
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
</head>
<body>
    <div class="app-container">
        <!-- Groups View -->
        <div id="groups-view">
            <header>
                <div class="header-content">
                    <h1 class="app-title">Split Money</h1>
                    <button id="install-btn" class="btn btn-secondary" hidden>Install App</button>
                </div>
            </header>
            <main>
                <section class="card">
                    <h2>Your Groups</h2>
                    <div id="groups-list" class="groups-list">
                        <!-- Group cards generated here -->
                    </div>
                </section>
                <section class="card">
                    <h2>Create New Group</h2>
                    <form id="add-group-form" class="add-form">
                        <input type="text" id="group-name-input" placeholder="e.g., Summer Trip, Roommates" required autocomplete="off">
                        <button type="submit" class="btn btn-primary">Create</button>
                    </form>
                </section>
            </main>
        </div>

        <!-- Group Detail View -->
        <div id="group-detail-view" style="display: none;">
            <header>
                <div class="header-content">
                    <button id="back-btn" class="btn btn-icon" title="Back to Groups">
                        &#8592;
                    </button>
                    <input type="text" id="group-title" class="title-input" placeholder="Enter Group Name">
                </div>
            </header>

            <main>
                <!-- Members Section -->
                <section class="card" id="members-section">
                    <h2>Members</h2>
                    <div class="members-list" id="members-list">
                        <!-- Members will be added here -->
                    </div>
                    <form id="add-member-form" class="add-form">
                        <input type="text" id="member-name" placeholder="Name (e.g., Alice)" required autocomplete="off">
                        <button type="submit" class="btn btn-primary">Add Member</button>
                    </form>
                </section>

                <!-- Add Expense Section -->
                <section class="card" id="add-expense-section">
                    <h2>Add Payment</h2>
                    <form id="add-expense-form">
                        <div class="form-group">
                            <label for="expense-title">What did we buy?</label>
                            <input type="text" id="expense-title" placeholder="e.g., Vegetables" required autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="expense-amount">Amount</label>
                            <input type="number" id="expense-amount" placeholder="0.00" min="0.01" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="expense-payer">Who paid?</label>
                            <select id="expense-payer" required>
                                <option value="" disabled selected>Select member</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Split between:</label>
                            <div id="split-members-list" class="checkbox-group">
                                <div class="empty-state" style="padding: 0;">Add members first</div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary full-width">Save Payment</button>
                    </form>
                </section>

                <!-- Balances Section -->
                <section class="card" id="balances-section">
                    <h2>Settlements</h2>
                    <div id="balances-list" class="balances-list">
                        <div class="empty-state">No balances to settle yet.</div>
                    </div>
                </section>
                
                <!-- Expenses History Section -->
                <section class="card" id="history-section">
                     <h2>Recent Expenses</h2>
                     <div id="history-list" class="history-list">
                         <div class="empty-state">No expenses added yet.</div>
                     </div>
                </section>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
